name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Type-check
        run: uv run mypy
      - name: Test
        run: uv run pytest

  # Fault-injection replay + grade (frozen §5/§6/§7). Deterministic and in-process — no broker —
  # so it runs in the fast lane on every push: verify the committed fixture's checksum, replay it
  # through the seeded injector and the real gate, and grade detection precision/recall against the
  # injection manifest with bootstrap 95% CIs. The designed-miss duplicates (dups past the LRU
  # window the gate cannot catch) are reported honestly as the R3 recall gap, not treated as a
  # failure. The graded telemetry JSON is archived. The broker-based metrics job that publishes the
  # Pages dashboard with full provenance (commit SHA, runner spec, latency percentiles) is Day D.
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync
      - name: Replay the committed fixture and grade with bootstrap CIs
        run: uv run tickflow metrics --out metrics.json
      - name: Archive graded telemetry
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json

  # Release-blocking scan (§11/§14): no third-party-affiliation reference anywhere in the tracked
  # files or the commit history, and no market-data-derived field in any published artifact. Runs
  # on every push so a violation is caught when it lands, not at tag time. fetch-depth: 0 is
  # required -- the history scan is meaningless against a shallow clone.
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the scan reads the full commit history, not just the tip
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync
      # Regenerate the artifact BEFORE gating it. Without this the scan inspects the committed
      # site/ snapshot, so a change to export.py that starts emitting a market-data field would
      # pass here (the snapshot is still clean) and never reach pages.yml, which has no
      # pull_request trigger -- the leak would land on main before anything caught it. Gating
      # freshly-generated output makes this job test the current code, not a past artifact.
      - name: Regenerate the artifact so the gate inspects current output
        run: uv run tickflow export --profile "github-actions (in-process, no broker)"
      - name: Release gate
        run: uv run bash scripts/release_gate.sh
      # The committed site/ is what the README links to, so it must not silently drift from what
      # the code produces. Compared excluding throughput (wall-clock, nondeterministic by nature)
      # and the timestamp/commit stamps; every measured quality number is deterministic and must
      # match exactly.
      - name: Check the committed artifact has not drifted
        run: |
          uv run python -c "
          import json, subprocess, sys
          fresh = json.load(open('site/telemetry.json'))
          committed = json.loads(
              subprocess.run(['git','show','HEAD:site/telemetry.json'],
                             capture_output=True, text=True, check=True).stdout)
          for d in (fresh, committed):
              d.pop('throughput', None)
              d['provenance'].pop('generated_at', None)
              d['provenance'].pop('commit', None)
              d['provenance'].pop('profile', None)
              d['provenance'].pop('runner', None)
              d['provenance'].pop('tickflow_version', None)
          if fresh != committed:
              print('::error::site/telemetry.json is stale - run: tickflow export')
              for k in set(fresh) | set(committed):
                  if fresh.get(k) != committed.get(k):
                      print(f'  differs: {k}')
              sys.exit(1)
          print('committed artifact matches current code output')
          "

  # Contract lane: register trades.v1 in Redpanda's Schema Registry with BACKWARD
  # compatibility and assert the local contract stays compatible (§2, §10). Needs only the
  # registry, so it runs now — ahead of the full end-to-end integration lane.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync
      - name: Start Redpanda + Schema Registry (dev profile)
        run: docker compose --profile dev up -d --wait
      - name: Wait for the Schema Registry
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://localhost:18081/subjects && break || sleep 2
          done
      - name: Register trades.raw-value (BACKWARD)
        run: uv run tickflow contract register
      - name: Assert local contract is BACKWARD-compatible
        run: uv run tickflow contract check
      - name: Tear down
        if: always()
        run: docker compose --profile dev down -v

  # Integration lane: end-to-end replay against a real single-node Redpanda,
  # wired up as source logic lands (§10). Skeleton only on Day A.
  integration:
    runs-on: ubuntu-latest
    if: false # enabled once the gate + replay path exist (Day C)
    services:
      redpanda:
        image: redpandadata/redpanda:v24.2.7
    steps:
      - uses: actions/checkout@v4
      - run: echo "integration lane placeholder"
