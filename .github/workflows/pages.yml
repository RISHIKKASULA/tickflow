# Regenerate the telemetry dashboard and deploy it to GitHub Pages (frozen §7/§8).
#
# What this publishes: PIPELINE TELEMETRY ONLY. Detection precision/recall with CIs, the
# false-quarantine rate over both denominators, the gates-ON/OFF SLO comparison, and completeness.
# No performance figure of any kind -- the in-process throughput this once published varied 3x
# across machines and 1.6x between runs on the same runner class, so it was removed rather than
# caveated. It publishes NO market data — no prices, no derived market values, no OHLCV bar
# values — anywhere on the page or in telemetry.json. That is a release-blocking constraint
# (Coinbase/Kraken ToS, §1) and it is enforced mechanically inside `tickflow export`, which raises
# MarketDataLeak and fails this job rather than deploying. The verify step below re-asserts it on
# the built artifact, so the check runs on what actually ships, not only on what was generated.
#
# The schedule is BEST-EFFORT and the page says so. GitHub does not guarantee that scheduled
# workflows fire on time, or at all, when the queue is busy — so the page states "last refreshed
# <timestamp>" and never claims a refresh cadence.
#
# Everything here runs in-process against the committed, checksum-pinned fixture. No broker is
# started -- and no performance figure is published at all, so nothing on this page could.

name: pages

on:
  push:
    branches: [main]
    paths:
      - "src/tickflow/**"
      - "contracts/**"
      - "fixtures.yaml"
      - "fixtures/**"
      - ".github/workflows/pages.yml"
  schedule:
    # Best-effort daily refresh. Not a promise; see the header.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a deploy midway; queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync

      - name: Verify the committed fixture's pins
        run: uv run tickflow fixture verify

      - name: Regenerate telemetry + dashboard
        run: uv run tickflow export --profile "github-actions (in-process, no broker)"

      - name: Verify the built artifact is telemetry-only
        # Belt and braces: `tickflow export` already refuses to write market data, but this
        # re-checks the file that is about to be deployed. A grep is a weak check on its own and a
        # good second one — it would catch a value smuggled in as page text rather than as a JSON
        # field, which the field-name rule cannot see.
        run: |
          uv run python -c "
          import json, sys
          from tickflow import export
          payload = json.load(open('site/telemetry.json'))
          export.assert_telemetry_only(payload)
          print('telemetry-only: OK')
          "
          if grep -nEi '"(price|open|high|low|close|volume|vwap|mid|bid|ask)"[[:space:]]*:' site/telemetry.json; then
            echo "::error::market-data field in the published artifact (ToS §1)"
            exit 1
          fi
          if grep -nEi 'updated (daily|hourly|nightly|every)' site/index.html; then
            echo "::error::the page claims a refresh cadence the best-effort cron cannot promise"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
